<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MoodLamp</title>
  <style>
    :root {
      --color: #f1c40f;
      --color-soft: rgba(241, 196, 15, 0.18);
      --bg: #0a0a0c;
      --fg: #fff;
      --muted: rgba(255, 255, 255, 0.5);
      --faint: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      color: var(--fg);
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), 16px) 20px max(env(safe-area-inset-bottom), 32px);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 50% 20%, var(--color-soft) 0%, transparent 65%),
        radial-gradient(ellipse at 50% 100%, var(--color-soft) 0%, transparent 50%);
      transition: background-image 1.5s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      max-width: 460px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }
    header .title { letter-spacing: 3px; }
    button {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 4px 8px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { color: var(--fg); }

    /* === HERO : score géant === */
    .hero {
      flex: 1;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px 0 30px;
      min-height: 280px;
    }
    .score {
      font-size: clamp(120px, 32vw, 180px);
      font-weight: 100;
      line-height: 1;
      letter-spacing: -6px;
      color: var(--color);
      text-shadow: 0 0 40px var(--color-soft);
      transition: color 1.2s ease, text-shadow 1.2s ease;
      font-variant-numeric: tabular-nums;
    }
    .state {
      margin-top: 18px;
      font-size: 13px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .state .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color);
      margin-right: 10px;
      vertical-align: middle;
      transition: background 1.2s;
    }

    /* === SPARKLINE === */
    .spark-wrap {
      width: 100%;
      max-width: 460px;
      margin-top: 6px;
    }
    .spark-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .spark-row .tabs {
      display: flex;
      gap: 4px;
    }
    .tab {
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 4px;
      transition: background 0.2s, color 0.2s;
    }
    .tab.active { color: var(--fg); background: var(--faint); }
    .spark {
      width: 100%;
      height: 80px;
      display: block;
    }
    .spark .ref { stroke: rgba(255,255,255,0.06); stroke-width: 1; stroke-dasharray: 2,3; }
    .spark .lbl { fill: rgba(255,255,255,0.3); font-size: 9px; font-family: inherit; }
    .spark .empty {
      fill: var(--muted);
      font-size: 11px;
      font-family: inherit;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* === COMPONENTS INLINE === */
    .components {
      width: 100%;
      max-width: 460px;
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      padding: 14px 0;
      border-top: 1px solid var(--faint);
      border-bottom: 1px solid var(--faint);
    }
    .comp {
      text-align: center;
      padding: 0 4px;
      border-right: 1px solid var(--faint);
    }
    .comp:last-child { border-right: none; }
    .comp-name {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .comp-value {
      font-size: 22px;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
    }
    .comp-detail {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      min-height: 12px;
    }

    /* === FOOTER META === */
    .meta {
      width: 100%;
      max-width: 460px;
      margin-top: 18px;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .meta .freshness {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .meta .freshness .pulse {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #27ae60;
      box-shadow: 0 0 6px currentColor;
      color: #27ae60;
    }
    .meta.warn .pulse { background: #e67e22; color: #e67e22; }
    .meta.bad .pulse { background: #c0392b; color: #c0392b; }
    .meta.warn { color: #ffc580; }
    .meta.bad { color: #ff8a80; }

    .err {
      max-width: 460px;
      width: 100%;
      margin-top: 12px;
      background: rgba(192, 57, 43, 0.18);
      border: 1px solid rgba(192, 57, 43, 0.4);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #ff8a80;
    }
  </style>
</head>
<body>
  <header>
    <span class="title">MoodLamp</span>
    <button id="refresh">Actualiser</button>
  </header>

  <div class="hero">
    <div class="score" id="score">—</div>
    <div class="state"><span class="dot"></span><span id="state-label">en attente</span></div>
  </div>

  <div class="spark-wrap">
    <div class="spark-row">
      <span id="spark-title">24 dernières heures</span>
      <span class="tabs">
        <span class="tab active" data-range="24">24h</span>
        <span class="tab" data-range="72">3j</span>
        <span class="tab" data-range="168">7j</span>
      </span>
    </div>
    <svg class="spark" id="spark" viewBox="0 0 400 80" preserveAspectRatio="none"></svg>
  </div>

  <div class="components" id="components"></div>

  <div class="meta" id="meta">
    <span class="freshness"><span class="pulse"></span><span id="fresh-text">—</span></span>
    <span id="meta-right">—</span>
  </div>

  <div id="error"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const scoreEl = $("score");
    const stateLabel = $("state-label");
    const compEl = $("components");
    const sparkEl = $("spark");
    const sparkTitle = $("spark-title");
    const metaEl = $("meta");
    const freshText = $("fresh-text");
    const metaRight = $("meta-right");
    const errEl = $("error");

    let currentData = null;
    let rangeHours = 24;

    function fmtAge(iso) {
      if (!iso) return "—";
      const ms = Date.now() - new Date(iso).getTime();
      const min = Math.round(ms / 60000);
      if (min < 1) return "à l'instant";
      if (min < 60) return `il y a ${min} min`;
      const h = Math.round(min / 60);
      if (h < 24) return `il y a ${h} h`;
      return `il y a ${Math.round(h / 24)} j`;
    }

    function pickStateLabel(d) {
      if (d.is_asleep) return "endormi";
      const a = d.recent_activity || {};
      const steps = a.steps_60min || 0;
      const maxHr = a.max_hr_60min || 0;
      if (maxHr >= 110 || steps >= 500) return "en mouvement";
      if (steps >= 50) return "actif";
      return "tranquille";
    }

    function setColor(hex) {
      document.documentElement.style.setProperty("--color", hex);
      document.documentElement.style.setProperty("--color-soft", hex + "30");
    }

    function drawSpark(history, hours) {
      const W = 400, H = 80, PAD = 4;
      const cutoff = Date.now() - hours * 3600 * 1000;
      const pts = (history || [])
        .filter((p) => new Date(p.ts).getTime() >= cutoff)
        .sort((a, b) => new Date(a.ts) - new Date(b.ts));

      if (pts.length < 2) {
        sparkEl.innerHTML = `<text class="empty" x="${W/2}" y="${H/2}" text-anchor="middle" dominant-baseline="middle">historique en cours d'accumulation</text>`;
        return;
      }

      const t0 = new Date(pts[0].ts).getTime();
      const t1 = new Date(pts[pts.length - 1].ts).getTime();
      const dt = Math.max(1, t1 - t0);

      const x = (ts) => PAD + ((new Date(ts).getTime() - t0) / dt) * (W - 2 * PAD);
      const y = (s) => PAD + (1 - s / 100) * (H - 2 * PAD);

      // Bandes de zone subtiles en fond (rouge/orange/jaune/vert)
      const zones = [
        { lo: 0,  hi: 30,  color: "#c0392b" },
        { lo: 30, hi: 50,  color: "#e67e22" },
        { lo: 50, hi: 70,  color: "#f1c40f" },
        { lo: 70, hi: 100, color: "#27ae60" },
      ];
      const zoneRects = zones.map((z) => {
        const yTop = y(z.hi), yBot = y(z.lo);
        return `<rect x="0" y="${yTop.toFixed(1)}" width="${W}" height="${(yBot - yTop).toFixed(1)}" fill="${z.color}" fill-opacity="0.06"/>`;
      }).join("");

      // Ligne multi-couleur : segment par couleur historique
      // (on duplique le point de transition dans les 2 segments → continuité visuelle)
      const segs = [];
      let cur = { color: pts[0].color_hex, pts: [pts[0]] };
      for (let i = 1; i < pts.length; i++) {
        const p = pts[i];
        if (p.color_hex === cur.color) {
          cur.pts.push(p);
        } else {
          cur.pts.push(p);
          segs.push(cur);
          cur = { color: p.color_hex, pts: [p] };
        }
      }
      if (cur.pts.length > 1) segs.push(cur);

      const lines = segs.map((s) => {
        const ptsStr = s.pts.map((p) => `${x(p.ts).toFixed(1)},${y(p.score).toFixed(1)}`).join(" ");
        return `<polyline points="${ptsStr}" fill="none" stroke="${s.color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>`;
      }).join("");

      const last = pts[pts.length - 1];
      const lx = x(last.ts), ly = y(last.score);

      sparkEl.innerHTML = `
        ${zoneRects}
        ${lines}
        <circle cx="${lx.toFixed(1)}" cy="${ly.toFixed(1)}" r="3.8" fill="#0a0a0c" stroke="${last.color_hex}" stroke-width="2.5"/>
      `;
    }

    const componentLabels = {
      sleep: "Sommeil", rhr: "FC repos", load: "Charge", discharge: "Décharge",
    };
    function detailFor(key, det) {
      if (!det) return "";
      switch (key) {
        case "sleep": return det.note || `${det.hours}h`;
        case "rhr":   return det.note || `${det.current} bpm`;
        case "load":  return `ratio ${det.ratio}`;
        case "discharge": return det.note || `${det.minutes_high_hr}min FC↑`;
      }
      return "";
    }

    function render(d) {
      currentData = d;
      setColor(d.color_hex);

      scoreEl.textContent = Math.round(d.score);
      stateLabel.textContent = `${d.color_name} · ${pickStateLabel(d)}`;

      compEl.innerHTML = "";
      for (const k of ["sleep", "rhr", "load", "discharge"]) {
        const div = document.createElement("div");
        div.className = "comp";
        div.innerHTML = `
          <div class="comp-name">${componentLabels[k]}</div>
          <div class="comp-value">${Math.round(d.components[k])}</div>
          <div class="comp-detail">${detailFor(k, d.components_detail[k])}</div>
        `;
        compEl.appendChild(div);
      }

      // Freshness
      metaEl.classList.remove("warn", "bad");
      if (!d.last_push_at) {
        freshText.textContent = "aucun envoi";
        metaEl.classList.add("bad");
      } else {
        const ageMin = Math.round((Date.now() - new Date(d.last_push_at)) / 60000);
        freshText.textContent = "envoi " + fmtAge(d.last_push_at);
        if (ageMin > 180) metaEl.classList.add("bad");
        else if (ageMin > 90) metaEl.classList.add("warn");
      }
      metaRight.textContent = `confiance ${Math.round(d.confidence * 100)}% · baseline ${Math.round(d.baseline.rhr_mean)}`;

      drawSpark(d.score_history, rangeHours);
    }

    document.querySelectorAll(".tab").forEach((t) => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((x) => x.classList.remove("active"));
        t.classList.add("active");
        rangeHours = parseInt(t.dataset.range, 10);
        sparkTitle.textContent = rangeHours === 24 ? "24 dernières heures"
          : rangeHours === 72 ? "3 derniers jours"
          : "7 derniers jours";
        if (currentData) drawSpark(currentData.score_history, rangeHours);
      });
    });

    async function load() {
      errEl.innerHTML = "";
      try {
        const r = await fetch("/api/score?_=" + Date.now());
        if (!r.ok) {
          if (r.status === 404) {
            const j = await r.json();
            throw new Error(
              j.reason === "no_baseline" ? "Baseline pas encore poussée."
              : j.reason === "no_history" ? "En attente du premier export HAE."
              : `404 (${j.reason})`
            );
          }
          throw new Error(`HTTP ${r.status}`);
        }
        render(await r.json());
      } catch (e) {
        errEl.innerHTML = `<div class="err">${e.message}</div>`;
        scoreEl.textContent = "—";
        stateLabel.textContent = "indisponible";
      }
    }

    $("refresh").addEventListener("click", load);
    load();
    setInterval(load, 5 * 60 * 1000);
  </script>
</body>
</html>
